<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Pyodide Image Processing (CPU NumPy)</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; gap: 20px; padding: 20px; }
        canvas { border: 1px solid #ccc; max-width: 90vw; background-color: #eee; }
        .controls { display: flex; flex-direction: column; gap: 10px; width: 300px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; }
        #status { font-weight: bold; color: #555; }
        .slider-group { display: flex; flex-direction: column; gap: 5px; }
    </style>
</head>
<body>
    <h1>Pyodide Image Processing (Pure NumPy)</h1>
    
    <div class="controls">
        <label for="image_field">Upload Image:</label>
        <input id="image_field" type="file" accept="image/*">
        
        <div class="slider-group">
            <label id="b_label">Brightness: 0</label>
            <input id="brightness_range" type="range" min="-100" max="100" step="1" value="0">
        </div>

        <div class="slider-group">
            <label id="c_label">Contrast: 0</label>
            <input id="contrast_range" type="range" min="-100" max="100" step="1" value="0">
        </div>

        <button id="export_btn" style="margin-top: 10px; padding: 10px; cursor: pointer; background: #4CAF50; color: white; border: none; border-radius: 4px;">Export Original Size</button>
    </div>

    <canvas id="image_canvas"></canvas>
    <div id="status">Starting Worker...</div>

    <script src="scripts/main.js"></script>
</body>
</html>
